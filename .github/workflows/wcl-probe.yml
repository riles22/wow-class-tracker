name: WCL API probe (diagnostic)

# Manual-dispatch-only diagnostic for the standing WCL v2 GraphQL issue (the
# rdps-family metrics 500 on every encounter — see docs/security-audit-2026-07.md
# and .claude/skills/ptr-watch/log.md 2026-07-14). Deterministic: runs a fixed
# probe script with the WCL API secrets and prints values/counts only — no AI, no
# untrusted-content interpretation, never echoes credentials. Cheap to re-run when
# checking whether WCL has fixed the broken metrics.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Probe the WCL v2 API
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        run: node src/wcl-probe.mjs
      - name: "TEMP (branch-only, 2026-07-22): Robydoby sheet public-access + tab map probe"
        run: |
          SHEET=1HpszfQOHqDQj8gacsID5Wq7OP6ndpGXoD2PgIs_dGB8
          echo "--- htmlview (tab names + gids) ---"
          curl -sS -L -m 60 "https://docs.google.com/spreadsheets/d/$SHEET/htmlview" -o view.html -w "htmlview: HTTP %{http_code}, %{size_download}b\n" || true
          node --input-type=module - <<'NODE_EOF'
          import { readFileSync } from "node:fs";
          let h = "";
          try { h = readFileSync("view.html", "utf8"); } catch { console.log("no view.html"); process.exit(0); }
          if (/accounts\.google\.com|ServiceLogin/.test(h)) console.log("LOGIN WALL detected");
          const items = [...h.matchAll(/sheet-button-(\d+)[^>]*>\s*<a[^>]*>([^<]+)<\/a>/g)]
            .concat([...h.matchAll(/id:\s*"(\d+)"\s*,\s*name:\s*"([^"]+)"/g)]);
          const seen = new Set();
          for (const m of items) { const k = m[1]; if (!seen.has(k)) { seen.add(k); console.log(`gid=${m[1]} name=${m[2]}`); } }
          if (!seen.size) console.log(`no tab markers found; head: ${h.slice(0, 300).replace(/\n/g, " ")}`);
          NODE_EOF
          echo "--- csv export gid=0 (no auth) ---"
          curl -sS -L -m 60 "https://docs.google.com/spreadsheets/d/$SHEET/export?format=csv&gid=0" -o t.csv -w "export: HTTP %{http_code}, %{size_download}b\n" || true
          head -c 400 t.csv | tr -d '\0'; echo
