name: WCL API probe (diagnostic)

# Manual-dispatch-only diagnostic for the standing WCL v2 GraphQL issue (the
# rdps-family metrics 500 on every encounter — see docs/security-audit-2026-07.md
# and .claude/skills/ptr-watch/log.md 2026-07-14). Deterministic: runs a fixed
# probe script with the WCL API secrets and prints values/counts only — no AI, no
# untrusted-content interpretation, never echoes credentials. Cheap to re-run when
# checking whether WCL has fixed the broken metrics.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Probe the WCL v2 API
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        run: node src/wcl-probe.mjs
      - name: "TEMP (branch-only, 2026-07-21): fetch PTR dev-notes thread for verbatim tier-set text"
        run: |
          curl -sS -m 60 -H "Accept: application/json" \
            "https://us.forums.blizzard.com/en/wow/t/midnight-curse-of-ulatek-ptr-development-notes/2317811.json?include_raw=1" \
            -o thread.json
          node --input-type=module - <<'NODE_EOF'
          import { readFileSync } from "node:fs";
          const t = JSON.parse(readFileSync("thread.json", "utf8"));
          const posts = t.post_stream?.posts ?? [];
          console.log(`thread: ${t.title} — ${posts.length} posts in stream`);
          for (const n of [10, 11, 14, 15]) {
            const p = posts.find(p => p.post_number === n);
            if (!p) { console.log(`\n===== post #${n}: NOT in post_stream =====`); continue; }
            const text = (p.raw ?? p.cooked ?? "").replace(/<[^>]+>/g, "").replace(/&amp;/g, "&").replace(/&#39;|&rsquo;/g, "'").replace(/&quot;/g, '"');
            console.log(`\n===== post #${n} (${p.created_at}) — set-bonus lines =====`);
            const lines = text.split("\n");
            lines.forEach((line, i) => {
              if (/venomous abyss|tier set|[24][ -]set|set bonus/i.test(line)) {
                console.log(`  [ctx] ${lines[i-1]?.trim() ?? ""}`);
                console.log(`  ${line.trim()}`);
              }
            });
          }
          NODE_EOF
