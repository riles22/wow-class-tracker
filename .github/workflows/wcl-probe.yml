name: WCL API probe (diagnostic)

# Manual-dispatch-only diagnostic for the standing WCL v2 GraphQL issue (the
# rdps-family metrics 500 on every encounter — see docs/security-audit-2026-07.md
# and .claude/skills/ptr-watch/log.md 2026-07-14). Deterministic: runs a fixed
# probe script with the WCL API secrets and prints values/counts only — no AI, no
# untrusted-content interpretation, never echoes credentials. Cheap to re-run when
# checking whether WCL has fixed the broken metrics.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Probe the WCL v2 API
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        run: node src/wcl-probe.mjs
      - name: "TEMP (branch-only): Robydoby HEALER sheet tab map + newest-week percentiles"
        run: |
          node --input-type=module - <<'NODE_EOF'
          const SHEET = "1MBadxaZWpwj7h_3HcOtteypK3WSgp6o9sUIqvTryju4";
          const view = await (await fetch(`https://docs.google.com/spreadsheets/d/${SHEET}/htmlview`)).text();
          const tabs = [...view.matchAll(/items\.push\(\{name: "((?:[^"\\]|\\.)+)", pageUrl: "[^"]*gid=(\d+)/g)]
            .map(m => ({ name: m[1].replace(/\\\//g, "/"), gid: m[2] }));
          console.log("TABS:", JSON.stringify(tabs));
          const va = tabs.filter(t => /^\d+\/\d+ (HC|M) /.test(t.name) && !/Tidebound/i.test(t.name));
          const dateOf = t => { const [d, mo] = t.name.match(/^(\d+)\/(\d+)/).slice(1).map(Number); return mo * 100 + d; };
          const newest = Math.max(...va.map(dateOf));
          const week = va.filter(t => dateOf(t) === newest);
          console.log("NEWEST WEEK:", JSON.stringify(week.map(t => t.name)));
          const parseCsv = line => { const out = []; let cur = "", q = false;
            for (const ch of line) { if (q) { if (ch === '"') q = false; else cur += ch; }
              else if (ch === '"') q = true; else if (ch === ",") { out.push(cur); cur = ""; } else cur += ch; }
            out.push(cur); return out; };
          for (const t of week) {
            const csv = await (await fetch(`https://docs.google.com/spreadsheets/d/${SHEET}/export?format=csv&gid=${t.gid}`)).text();
            const lines = csv.split("\n").map(parseCsv);
            const hdr = lines.find(c => c.filter(x => x === "90th Percentile").length);
            if (!hdr) { console.log(`TAB ${t.name}: no percentile header`); continue; }
            const i = hdr.lastIndexOf("90th Percentile");
            const rows = lines.filter(c => /^[A-Za-z]+-[A-Za-z]+$/.test(c[i - 1] ?? "") && /^[\d,]+$/.test(c[i + 2] ?? ""))
              .map(c => [c[i - 1], c[i], c[i + 1], c[i + 2]]);
            console.log(`TAB ${t.name}: ${JSON.stringify(rows)}`);
            await new Promise(r => setTimeout(r, 800));
          }
          NODE_EOF
