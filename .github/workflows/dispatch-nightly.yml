name: Dispatch nightly refresh after workflow changes

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/nightly.yml"
      - ".github/workflows/dispatch-nightly.yml"

permissions:
  actions: write
  contents: read

concurrency:
  group: dispatch-nightly-refresh
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Start the nightly workflow as workflow_dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run nightly.yml --ref master --repo "$GITHUB_REPOSITORY"
