name: Nightly tracker refresh

# The AI stages only fetch and edit the read-only checkout. The deterministic
# publish job owns validation, commits, pushes, and Pages deployment.
on:
  schedule:
    - cron: "37 10 * * *"
  workflow_dispatch:
  # A reviewed change to this workflow immediately exercises the new path once
  # after merge; ordinary data pushes do not trigger another refresh.
  push:
    branches: [master]
    paths:
      - ".github/workflows/nightly.yml"

concurrency:
  group: nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install pinned yt-dlp
        run: pipx install "yt-dlp==$(sed -n 's/^yt-dlp==//p' requirements.txt)"

      - name: Primary full refresh (Claude Code, read-only token)
        id: primary_agent
        continue-on-error: true
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        timeout-minutes: 42
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        with:
          github_token: ${{ github.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --permission-mode bypassPermissions
            --max-turns 250
            --model claude-sonnet-5
          prompt: |
            Maintain the WoW Midnight tracker in this checked-out repository. You are the
            unprivileged fetch-and-distill stage: never commit, push, tag, dispatch a workflow,
            print a secret, or write outside this working tree.

            Read CLAUDE.md and all four refresh skills before acting:
            .claude/skills/ptr-watch/SKILL.md
            .claude/skills/watch-creators/SKILL.md
            .claude/skills/refresh-tiers/SKILL.md
            .claude/skills/refresh-metrics/SKILL.md

            Complete ALL four skills in this run. Attempt every key in
            data/required-sources.json even when stored data is already fresh. Fetch game data
            live; never substitute model memory or guesses. For Warcraft Logs use the sanctioned
            v2 GraphQL API with WCL_CLIENT_ID/WCL_CLIENT_SECRET and the documented recipes; do not
            scrape WCL HTML from this runner. Expected source degradation must leave existing data
            unchanged and be recorded honestly.

            PTR watch must check the official forum/Wowhead feed plus WCL PTR raid zone 54 for all
            three roles and Dummy Dome zone 52. Creator watch must poll every configured YouTube
            feed; use the already-installed yt-dlp, back off from datacenter blocking, and record
            pending videos rather than hammering. Creator opinions never move tiers.

            Rebuild data/run-manifest.json from scratch for THIS run. It must contain today's UTC
            run date, a current full UTC startedAt instant, a <=180-character summary, and exactly
            one source row for every requirement key. previousAsOf/newAsOf must match the actual
            committed baseline and final stored data. Never write anomalyAck: a genuine mass shift
            must be documented with evidence in row details and left for deterministic human review.

            Run npm test and npm run build before finishing. If a source edit cannot be made valid,
            revert only that source's edits and record parse_error with a useful reason. Do not stop
            after PTR/creator work; tiers, metrics, tests, build, and the fresh manifest are mandatory.

      - name: Check primary agent completion
        id: primary_check
        continue-on-error: true
        run: |
          set -euo pipefail
          if git diff --quiet -- data/run-manifest.json; then
            echo "::error::Primary agent did not rewrite data/run-manifest.json"
            exit 1
          fi
          node src/check-manifest-provenance.mjs
          node src/check-refresh.mjs --manifest

      - name: Recovery pass for incomplete refresh
        if: steps.primary_agent.outcome != 'success' || steps.primary_check.outcome != 'success'
        uses: anthropics/claude-code-action@f1bd27ca5b54584506e40e17884d90bdaaa1a9b3 # v1
        timeout-minutes: 35
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        with:
          github_token: ${{ github.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --permission-mode bypassPermissions
            --max-turns 180
            --model claude-sonnet-5
          prompt: |
            The primary nightly agent exited without satisfying the deterministic refresh contract.
            Resume from the CURRENT working tree; preserve valid completed work and inspect git diff
            plus all four skill logs to identify what is missing.

            Read CLAUDE.md and the ptr-watch, watch-creators, refresh-tiers, and refresh-metrics
            SKILL.md files. Finish every missing skill and attempt every requirement in
            data/required-sources.json. The common failure is stopping after PTR/creator work, so
            explicitly complete tiers and metrics before finalizing. Use only live fetched data and
            the sanctioned WCL v2 API. Never guess, commit, push, dispatch, or expose secrets.

            Rebuild data/run-manifest.json from scratch with a current UTC startedAt and one honest
            row per required source. previousAsOf/newAsOf must match the real baseline/final files.
            Never add anomalyAck; document real anomalies for human review. Run npm test and
            npm run build, repair or narrowly revert invalid source edits, and do not finish until
            both commands and the manifest contract pass.

      - name: Final deterministic completion gate
        if: always() && !cancelled()
        run: |
          set -euo pipefail
          if git diff --quiet -- data/run-manifest.json; then
            echo "::error::data/run-manifest.json is unchanged; no complete refresh was produced"
            exit 1
          fi
          npm test
          npm run build
          node src/check-manifest-provenance.mjs
          node src/check-refresh.mjs --manifest

      - name: Upload refresh output for publication or debugging
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nightly-refresh
          include-hidden-files: true
          retention-days: 7
          path: |
            data/
            .claude/skills/*/log.md

  publish:
    needs: refresh
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Git identity
        run: |
          git config user.name "Riley"
          git config user.email "120138825+riles22@users.noreply.github.com"

      - name: Download refresh output
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nightly-refresh
          path: .

      - name: Show what the refresh changed
        run: git status --porcelain && git --no-pager diff --stat || true

      - name: "Gate 1: validate + unit tests"
        run: npm test

      - name: "Gate 2: build"
        run: npm run build

      - name: "Gate 3: manifest provenance + completeness + anomaly"
        run: |
          if git diff --quiet -- data/run-manifest.json; then
            echo "::error::data/run-manifest.json is unchanged from the committed copy"
            exit 1
          fi
          node src/check-manifest-provenance.mjs
          node src/check-refresh.mjs --manifest

      - name: Snapshot movement baseline
        run: |
          if git status --porcelain -- data/ | grep -v "data/run-manifest.json" | grep -q .; then
            node src/snapshot.mjs
          else
            echo "No data changes beyond the run manifest — no snapshot"
          fi

      - name: Commit and push explicit paths
        id: commit
        run: |
          git add data/ dist/ ".claude/skills/*/log.md"
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --cached --quiet -- data/ dist/ ':(exclude)data/run-manifest.json'; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi
          SUMMARY="$(node -e 'const m=JSON.parse(require("fs").readFileSync("data/run-manifest.json","utf8")); console.log(String(m.summary??"refresh").replace(/[^\x20-\x7E]/g," ").replace(/\s+/g," ").trim().slice(0,180))')"
          git commit -m "Nightly refresh $(date -u +%F): ${SUMMARY}" -m "Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin master || { git pull --rebase origin master && git push origin master; }
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger Pages deploy when site inputs changed
        if: steps.commit.outputs.pushed == 'true' && steps.commit.outputs.deploy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref master
