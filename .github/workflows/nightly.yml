name: Nightly tracker refresh
run-name: "Nightly tracker refresh (${{ inputs.agent_model || 'claude-opus-4-8' }})"

# Machine-off nightly automation. Isolated stages (2026-07-14 security audit + same-day
# re-audit; agent-resilience pass 2026-07-16/17 after six consecutive incomplete runs):
#
#   1. Deterministic WCL fetch — the ONLY step holding WCL_CLIENT_ID/WCL_CLIENT_SECRET
#      (step-scoped env). Runs src/fetch-wcl.mjs, writes wcl-fetch/evidence.json, and
#      uploads it as its own artifact BEFORE any agent runs — the agents' only WCL
#      input, and tamper-evident for the publish gate.
#   2. Primary agent (DE-PRIVILEGED) — Claude Code fetches untrusted web content on a
#      contents:read token with no persisted checkout credentials and NO WCL secrets;
#      its only secret is its own OAuth token. Leaves edits in the working tree and
#      rebuilds data/run-manifest.json.
#   3. Recovery agent — runs only when the primary ended without satisfying the
#      deterministic completion check (the recurring failure shape: agents ending
#      after minutes with no manifest).
#   4. Final deterministic completion gate — manifest rewritten + npm test + build +
#      check-refresh + WCL-credential health, so an incomplete refresh fails HERE
#      with the real reason.
#   5. publish (deterministic, PRIVILEGED) — no AI. Downloads the artifacts, re-runs
#      every gate (cross-checking WCL manifest rows against the pre-agent evidence
#      artifact), snapshots, stages explicit paths, commits, pushes, dispatches the
#      Pages deploy. The anomaly gate's override is HUMAN-ONLY via the anomaly_ack
#      workflow_dispatch input — the agent-written manifest can only propose.
#
# Secrets required (Settings → Secrets and variables → Actions):
#   CLAUDE_CODE_OAUTH_TOKEN — from `claude setup-token` (Pro/Max; valid ~1 year — renew!)
#   WCL_CLIENT_ID           — Warcraft Logs v2 API client UUID
#   WCL_CLIENT_SECRET       — Warcraft Logs v2 API client secret

on:
  schedule:
    # 10:37 UTC — deliberately an odd minute; :00–:10 congestion drops scheduled runs.
    - cron: "37 10 * * *"
  workflow_dispatch: # manual runs; also the ONLY way to approve an anomaly
    inputs:
      anomaly_ack:
        description: >-
          Human approval for a mass tier-movement anomaly (reason + citation, e.g.
          "Blizzard 12.1 mass retune, forum post #19"). Leave empty for normal runs —
          only set it when re-running after the anomaly gate blocked a REAL, citable
          Blizzard mass retune. Scheduled runs can never carry an ack.
        required: false
        default: ""
      agent_model:
        description: >-
          Claude model for BOTH refresh agents, this run only (one-off trials, e.g.
          claude-fable-5 or claude-sonnet-5). Scheduled runs always use the default.
        required: false
        default: "claude-opus-4-8"

concurrency:
  group: nightly-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read # the agent job holds NO write scopes — publication happens in `publish`
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # No token left in .git/config: the agents' shells have no ambient push credential.
          persist-credentials: false
          fetch-depth: 1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      # yt-dlp at the version pinned in requirements.txt — the agents must never
      # install or upgrade packages themselves.
      - name: Install pinned yt-dlp
        run: pipx install "yt-dlp==$(sed -n 's/^yt-dlp==//p' requirements.txt)"

      # Deterministic WCL stage (re-audit 2026-07-14): the ONLY step holding the WCL
      # credentials — step-scoped env, gone before any agent starts. Always exits 0
      # when evidence was written; bad verdicts go red in the final gate.
      - name: Deterministic WCL fetch (only step with WCL credentials)
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        run: node src/fetch-wcl.mjs

      # Uploaded BEFORE the agents run: the publish gate cross-checks WCL manifest
      # rows against THIS copy, so an agent (which can edit the working-tree copy)
      # has no window to tamper with what the gate reads.
      - name: Publish WCL fetch evidence (pre-agent, tamper-evident)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wcl-evidence
          retention-days: 7
          path: wcl-fetch/

      # Deterministic transcript stage (owner-approved 2026-07-17): the ONLY step
      # holding TRANSCRIPT_API_KEY (Supadata; mode=native = YouTube's own captions,
      # the same source yt-dlp read before the datacenter bot-wall). Drains the
      # agent-maintained data/pending-transcripts.json queue into transcript-fetch/
      # for the agents to distill. A missing secret is a CLEAN skip (verdict
      # no-credentials) — the lane activates the run after the owner adds the secret.
      - name: Deterministic transcript fetch (only step with the transcript API key)
        env:
          TRANSCRIPT_API_KEY: ${{ secrets.TRANSCRIPT_API_KEY }}
        run: node src/fetch-transcripts.mjs

      # First-party action pinned to the v1-tag commit (unpinned mutable tags are a
      # supply-chain risk in an unattended secret-bearing job); Dependabot proposes
      # reviewed bumps. NOTE: no WCL_* env on either agent step — their only secret
      # is the Claude OAuth token (their own auth).
      - name: Primary full refresh (Claude Code, read-only token)
        id: primary_agent
        continue-on-error: true
        uses: anthropics/claude-code-action@b76a0776ae74036e77cd11018083743453d7ad35 # v1
        timeout-minutes: 42
        with:
          github_token: ${{ github.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot]"
          claude_args: |
            --permission-mode bypassPermissions
            --max-turns 250
            --model ${{ inputs.agent_model || 'claude-opus-4-8' }}
            --disallowedTools "Agent,Task"
          prompt: |
            Maintain the WoW Midnight tracker in this checked-out repository. You are the
            unprivileged fetch-and-distill stage: never commit, push, tag, dispatch a workflow,
            print a secret, or write outside this working tree.

            Read CLAUDE.md and all four refresh skills before acting:
            .claude/skills/ptr-watch/SKILL.md
            .claude/skills/watch-creators/SKILL.md
            .claude/skills/refresh-tiers/SKILL.md
            .claude/skills/refresh-metrics/SKILL.md

            Complete ALL four skills in this run. Attempt every key in
            data/required-sources.json even when stored data is already fresh (policy
            2026-07-08: no staleness gate). Fetch game data live; never substitute model
            memory or guesses. Expected source degradation must leave existing data
            unchanged and be recorded honestly.

            WARCRAFT LOGS: you hold NO WCL credentials. A deterministic step already ran
            src/fetch-wcl.mjs and wrote wcl-fetch/evidence.json — your ONLY WCL input,
            covering every WCL cut (live zones 46/47, PTR zones 54/56, Dummy Dome zone 52).
            Write every WCL manifest row (wcl-live-raid, wcl-live-mplus, wcl-ptr-raid,
            wcl-ptr-mplus, wcl-dummy-dome, wcl-dummy-raw, wcl-ptr-raid-raw,
            wcl-ptr-mplus-raw) from it honestly. A WCL row may claim success ONLY when
            evidence.landed[key] shows rows — normally just the three *-raw keys, whose
            raw-DPS medians the fetch step merges into specs.json ITSELF before you start
            (never re-fetch, recompute, or edit those rows; if a landed entry is absent,
            report that key partial/unreachable/parse_error with the evidence's
            rawRecipes[key] detail — an empty PTR zone between testing windows is
            "partial", not an error). While the evidence reports verdict "rdps-broken",
            the five frozen rDPS/normalized cuts are unreachable with that detail and
            their stored data stays unchanged — the publish gate cross-checks an evidence
            artifact uploaded before you started, which you cannot modify. If the verdict
            is "rdps-restored", put "WCL RDPS RESTORED — owner decision needed on the
            median recipe" at the TOP of the summary; if it is "no-credentials" or
            "oauth-failed", surface that at the top too. Do NOT fetch anything from
            warcraftlogs.com yourself, by any means — no API, no HTML scraping, no workarounds.

            PTR watch must check the official forum thread and the Wowhead news RSS for new
            builds (the WCL zone-54/52 parts are evidence-only, per above). Creator watch must
            poll every configured YouTube feed; use the already-installed yt-dlp (never
            install, upgrade, or replace it or any other package), back off from datacenter
            blocking, and record pending videos rather than hammering. Creator opinions never
            move tiers.

            YOUTUBE TRANSCRIPTS: you hold NO transcript credentials. A deterministic step may
            have pre-fetched queued videos into transcript-fetch/ (summary.json + one
            <videoId>.json per video; chunk offsets are MILLISECONDS). Distill takes/metaNotes
            from those files per the watch-creators skill, and maintain
            data/pending-transcripts.json honestly: remove ONLY videos you distilled or
            transcript-verified-skipped, append new in-scope videos that have no fetched
            transcript. Never fetch transcripts from YouTube or any transcript API yourself.
            summary.json verdict "no-credentials" = the optional key isn't configured yet;
            keep queueing pending as before. Verdict "unauthorized" or "limit-exceeded" =
            put "TRANSCRIPT API KEY problem: <verdict>" near the top of the manifest summary.

            SEASON-FLIP GUARD: if era-verification fails because sources now self-identify as
            Season 2 / 12.1 LIVE (not because a page is broken), the patch has LAUNCHED. Keep
            refusing to ingest S2-live data as 12.0.7, but put "SEASON 2 IS LIVE — tracker
            needs its 12.1-live migration" at the TOP of the summary and in every affected
            row's detail. Do not attempt the migration autonomously.

            Rebuild data/run-manifest.json from scratch for THIS run — the committed copy is
            the PREVIOUS run's record and never excuses skipping work. It must contain today's
            UTC run date, a current full UTC startedAt instant, a <=180-character summary, and
            exactly one source row per requirement key, each with previousAsOf/newAsOf (the
            stored dates before/after this run — copy them from the actual data files, never
            fabricate) and an honest result: "success" ONLY when the source's stored dates
            actually advanced this run; anything less is partial/unreachable/blocked/
            parse_error WITH the reason; "skipped" without a detail fails the publish. NEVER
            write an "anomalyAck" field — the gate rejects any manifest carrying it. If a mass
            tier shift looks like a REAL Blizzard retune (not a parse artifact), set
            "anomalyAckProposal": "<reason + citation>" — it does NOT bypass the anomaly gate
            (only a human re-running this workflow with the anomaly_ack input can); it is your
            evidence for that human.

            Run npm test and npm run build before finishing. If a source edit cannot be made
            valid, revert only that source's edits (git checkout -- <files>) and record
            parse_error with a useful reason. Do not stop after PTR/creator work; tiers,
            metrics, tests, build, and the fresh manifest are mandatory.

            SINGLE-SHOT SESSION — the proven cause of every lost night since 07-15: this is
            a one-shot headless run. The moment you end your turn, the workflow moves on and
            you are NEVER woken again. Do NOT run anything in the background to "wait" for —
            no background agents or tasks, no completion notifications, no deferred polling
            (the 07-17 recovery agent finished every source, then ended its turn "waiting for
            the async creators poll to complete", and the whole night was discarded with the
            manifest unwritten). Subagent tools are disabled in this run; do ALL work inline
            in the foreground, slow feed polls included.

            COMPLETION CONTRACT: the run is NOT COMPLETE until data/run-manifest.json is
            REWRITTEN with this run's outcomes and `node src/check-refresh.mjs --manifest`
            passes. Before ending, run `git diff --stat -- data/run-manifest.json` and
            confirm it shows a change. If you must stop early for ANY reason — degraded
            sources, nothing new anywhere, errors you cannot fix — write the manifest FIRST,
            with honest rows for exactly what you attempted and what you did not get to,
            then stop. Ending without a rewritten manifest wastes the entire night no matter
            how much else you did.

      # The action writes its execution log to $RUNNER_TEMP/claude-execution-output.json
      # and the recovery pass OVERWRITES it — preserve the primary's copy first. These
      # transcripts are the only way to see WHY an agent ended early (the recurring
      # failure is model-independent: sonnet and opus both do it).
      - name: Preserve primary agent transcript
        if: always()
        run: cp "$RUNNER_TEMP/claude-execution-output.json" "$RUNNER_TEMP/agent-primary.json" 2>/dev/null || true

      - name: Check primary agent completion
        id: primary_check
        continue-on-error: true
        env:
          ANOMALY_ACK: ${{ inputs.anomaly_ack }}
        run: |
          set -euo pipefail
          if git diff --quiet -- data/run-manifest.json; then
            echo "::error::Primary agent did not rewrite data/run-manifest.json"
            exit 1
          fi
          node src/check-refresh.mjs --manifest

      - name: Recovery pass for incomplete refresh
        if: steps.primary_agent.outcome != 'success' || steps.primary_check.outcome != 'success'
        uses: anthropics/claude-code-action@b76a0776ae74036e77cd11018083743453d7ad35 # v1
        timeout-minutes: 35
        with:
          github_token: ${{ github.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "github-actions[bot]"
          claude_args: |
            --permission-mode bypassPermissions
            --max-turns 180
            --model ${{ inputs.agent_model || 'claude-opus-4-8' }}
            --disallowedTools "Agent,Task"
          prompt: |
            The primary nightly agent exited without satisfying the deterministic refresh
            contract. Resume from the CURRENT working tree; preserve valid completed work and
            inspect git diff plus all four skill logs to identify what is missing.

            Read CLAUDE.md and the ptr-watch, watch-creators, refresh-tiers, and refresh-metrics
            SKILL.md files. Finish every missing skill and attempt every requirement in
            data/required-sources.json. The common failure is stopping after PTR/creator work, so
            explicitly complete tiers and metrics before finalizing. Use only live fetched data.
            Never guess, commit, push, dispatch, or expose secrets.

            WARCRAFT LOGS: you hold NO WCL credentials — wcl-fetch/evidence.json (written by the
            deterministic pre-agent step) is your only WCL input; write all eight WCL manifest
            rows from it honestly. Success is allowed ONLY where evidence.landed[key] shows rows
            (normally just the three *-raw keys, already merged into specs.json by the fetch
            step — never re-fetch or edit those rows); the other cuts stay degraded with the
            evidence's rawRecipes[key] or verdict detail (the publish gate cross-checks a
            pre-agent artifact copy you cannot modify). Do not fetch warcraftlogs.com yourself,
            by any means. Same for YouTube transcripts: distill only from the pre-fetched
            transcript-fetch/ files (offsets in ms), maintain data/pending-transcripts.json
            honestly, and never fetch transcripts yourself.

            Rebuild data/run-manifest.json from scratch with a current UTC startedAt and one
            honest row per required source, each with previousAsOf/newAsOf copied from the real
            stored data. NEVER write an "anomalyAck" field (the gate rejects it); a real mass
            retune goes in "anomalyAckProposal" with a citation, for human review. Run npm test
            and npm run build, repair or narrowly revert invalid source edits, and do not finish
            until both commands and `node src/check-refresh.mjs --manifest` pass.

            SINGLE-SHOT SESSION — the proven cause of every lost night: the moment you end
            your turn, this session is over and you are NEVER woken again. Do NOT run
            anything in the background to "wait" for (background agents/tasks, completion
            notifications, deferred polls) — that is exactly how the previous runs died,
            finishing every source and then yielding while a creators poll ran in the
            background. Subagent tools are disabled; do ALL work inline in the foreground,
            and never end your turn until the manifest is rewritten and the gate passes.

      - name: Final deterministic completion gate
        if: always() && !cancelled()
        env:
          ANOMALY_ACK: ${{ inputs.anomaly_ack }}
        run: |
          set -euo pipefail
          if git diff --quiet -- data/run-manifest.json; then
            echo "::error::data/run-manifest.json is unchanged; no complete refresh was produced"
            exit 1
          fi
          npm test
          npm run build
          node src/check-refresh.mjs --manifest
          # WCL credential/config rot is invisible to the agents (they never hold the
          # secrets) — surface it deterministically as a red refresh job.
          verdict="$(node -e 'console.log(JSON.parse(require("fs").readFileSync("wcl-fetch/evidence.json","utf8")).verdict ?? "")' 2>/dev/null || echo unreadable)"
          case "$verdict" in
            no-credentials|oauth-failed|unreadable)
              echo "::error::WCL fetch step could not authenticate (verdict: $verdict) — check WCL_CLIENT_ID/WCL_CLIENT_SECRET"
              exit 1;;
          esac

      # When the night failed, put the agents' final moves where remote diagnosis can
      # read them (the job log) — artifacts alone need an interactive download.
      - name: Dump agent transcript tails (failure diagnosis)
        if: failure()
        run: |
          for f in "$RUNNER_TEMP/agent-primary.json" "$RUNNER_TEMP/claude-execution-output.json"; do
            [ -f "$f" ] || continue
            echo "===== tail of ${f##*/} ====="
            tail -c 16000 "$f" || true
            echo
          done

      # Full transcripts for interactive download (public repo: contents are the
      # agents' reasoning over already-public web pages; no secrets — the agents hold
      # none, and the action masks their own token).
      - name: Upload agent transcripts (diagnosis)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: agent-transcripts
          retention-days: 7
          if-no-files-found: ignore
          path: |
            ${{ runner.temp }}/agent-primary.json
            ${{ runner.temp }}/claude-execution-output.json

      # Everything the publish job may commit travels here — data/ (incl. the run
      # manifest) and the skill logs. dist/ is deliberately NOT transferred: publish
      # rebuilds it from source, so a tampered build artifact can't ride along.
      - name: Upload refresh output for publication or debugging
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nightly-refresh
          include-hidden-files: true
          retention-days: 7
          path: |
            data/
            .claude/skills/*/log.md

  publish:
    # Deterministic publication — no AI, no untrusted fetches. Runs even when the
    # refresh job failed: the gates below, not the agents' exit codes, decide
    # publishability, and they re-run from scratch on the downloaded artifacts.
    needs: refresh
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      actions: write # dispatches the Pages deploy workflow
      issues: write # posts the per-run digest comment (owner's daily email)
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          # CURRENT master, not the trigger-time sha: commits that land on master while
          # the ~30-min refresh job runs (2026-07-17: a template feature) otherwise
          # guarantee a dist/index.html conflict on push. The artifact still supplies
          # data/, and Gate 2 rebuilds dist/ from the freshest code either way.
          ref: master
          fetch-depth: 0 # movement baselines + row-drop baseline + race rebase

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"

      - name: Git identity
        run: |
          git config user.name "Riley"
          git config user.email "120138825+riles22@users.noreply.github.com"

      # Overlays the agents' data/ + skill logs onto the fresh checkout.
      - name: Download refresh output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: nightly-refresh
          path: .

      # The evidence copy the gate trusts: uploaded by the deterministic fetch step
      # BEFORE any agent ran (the agents' working-tree copy travels nowhere). A
      # missing artifact fails this step — and therefore the publish — by design.
      - name: Download WCL fetch evidence (pre-agent artifact)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: wcl-evidence
          path: wcl-fetch

      # Gate 0 (2026-07-18 portfolio audit): the refresh artifact may deliver VALUES,
      # never the rules that judge them. Before this guard, the agent-overlaid working
      # tree was also where check-refresh read its own contract — so a compromised or
      # confused agent could rewrite the gate's thresholds (or the tier scales, or
      # registry membership) in the same run those changes would excuse. Registry
      # files may change only in their agent-updatable fields; contract/scale changes
      # ship via reviewed commits to master and fail the night RED here. Agent-shipped
      # history snapshots are RESET, not failed (CLAUDE.md tells refreshes to snapshot,
      # so an agent doing that is compliant, not hostile) — the movement/anomaly
      # baseline must come from committed history, and publish derives its own
      # snapshot after the gates either way.
      - name: "Gate 0: agent output stays inside its boundaries"
        run: |
          set -euo pipefail
          if ! git diff --quiet HEAD -- data/required-sources.json data/scales.json; then
            git --no-pager diff HEAD -- data/required-sources.json data/scales.json
            echo "::error::refresh artifact modified the gate contract or tier scales — these ship only via reviewed commits to master"
            exit 1
          fi
          node -e '
            const { execSync } = require("child_process");
            const fs = require("fs");
            const changedBeyond = (file, volatile) => {
              const strip = (d) => JSON.parse(JSON.stringify(d, (k, v) => (volatile.includes(k) ? undefined : v)));
              const head = JSON.parse(execSync(`git show HEAD:${file}`, { encoding: "utf8" }));
              const now = JSON.parse(fs.readFileSync(file, "utf8"));
              return JSON.stringify(strip(head)) !== JSON.stringify(strip(now));
            };
            const bad = [];
            if (changedBeyond("data/sources.json", ["snapshot"])) bad.push("data/sources.json (beyond page snapshot dates)");
            if (changedBeyond("data/community.json", ["latest", "verifiedDate"])) bad.push("data/community.json (membership/links, beyond latest+verifiedDate)");
            if (bad.length) { console.error(`::error::refresh artifact changed ${bad.join(" and ")} — registry edits ship only via reviewed commits to master`); process.exit(1); }
          '
          if git status --porcelain -- data/history/ | grep -q .; then
            echo "Resetting agent-supplied data/history/ changes — the baseline must be committed history, and publish snapshots after the gates:"
            git status --porcelain -- data/history/
            git checkout HEAD -- data/history/
            git clean -fdq -- data/history/
          fi

      - name: Show what the refresh changed
        run: git status --porcelain && git --no-pager diff --stat || true

      - name: "Gate 1: validate + unit tests"
        run: npm test

      - name: "Gate 2: build"
        run: npm run build

      - name: "Gate 3: refresh contract (manifest · completeness · anomaly · WCL evidence)"
        env:
          # HUMAN-ONLY anomaly override: empty on scheduled runs; a person supplies it
          # via Run workflow → anomaly_ack after reviewing a blocked mass movement.
          # The agent-written manifest can only PROPOSE (anomalyAckProposal), which
          # check-refresh prints for that person — it never satisfies the gate.
          ANOMALY_ACK: ${{ inputs.anomaly_ack }}
        run: |
          # The agents must have REWRITTEN the manifest this run. An unchanged file
          # means the run free-rode on the previous record instead of doing
          # verifiable work (first shakeout, 2026-07-14).
          if git diff --quiet -- data/run-manifest.json; then
            echo "::error::data/run-manifest.json is unchanged from the committed copy"
            exit 1
          fi
          node src/check-refresh.mjs --manifest

      - name: Snapshot movement baseline
        run: |
          if git status --porcelain -- data/ | grep -v "data/run-manifest.json" | grep -q .; then
            node src/snapshot.mjs
          else
            echo "No data changes beyond the run manifest — no snapshot"
          fi

      - name: Commit and push explicit paths
        id: commit
        run: |
          set -euo pipefail
          git add data/ dist/ ".claude/skills/*/log.md"
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --cached --quiet -- data/ dist/ ':(exclude)data/run-manifest.json'; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi
          # Commit title comes from the agent-written manifest summary — sanitized to
          # one printable ASCII line, hard-capped (it originated from untrusted web content).
          SUMMARY="$(node -e 'const m=JSON.parse(require("fs").readFileSync("data/run-manifest.json","utf8")); console.log(String(m.summary??"refresh").replace(/[^\x20-\x7E]/g," ").replace(/\s+/g," ").trim().slice(0,180))')"
          git commit -m "Nightly refresh $(date -u +%F): ${SUMMARY}" -m "Co-Authored-By: Claude <noreply@anthropic.com>"
          if ! git push origin master; then
            # Push race: master moved between checkout and push. The old silent
            # `|| { git pull --rebase && git push; }` fallback LOST the 2026-07-17
            # 08:34 run's data — bash -e is suppressed inside a `||` group, so the
            # conflicted rebase (both sides had rebuilt dist/index.html) left the
            # step green with nothing pushed. Handle the race explicitly, and fail
            # RED when it cannot be resolved deterministically.
            git fetch origin master
            if ! git rebase origin/master; then
              conflicts="$(git diff --name-only --diff-filter=U)"
              if [ "$conflicts" = "dist/index.html" ]; then
                # The one expected conflict: dist/ is generated by both sides.
                # Regenerate it on the merged tree (master's src/ + this run's data/).
                npm run build
                git add dist/index.html
                GIT_EDITOR=true git rebase --continue
              else
                git rebase --abort || true
                echo "::error::Publish push race with conflicts beyond generated dist/ (${conflicts}) — re-run the workflow to redo the night on current master"
                exit 1
              fi
            else
              # Clean rebase — master may still carry newer src/, so rebuild dist on it.
              npm run build
              git add dist/
              git diff --cached --quiet || git commit --amend --no-edit
            fi
            git push origin master
          fi
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # GITHUB_TOKEN pushes don't auto-trigger `on: push` workflows (GitHub loop
      # protection), so dispatch the deploy explicitly when site inputs changed.
      - name: Trigger Pages deploy when site inputs changed
        if: steps.commit.outputs.pushed == 'true' && steps.commit.outputs.deploy == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --ref master

      # Owner-facing change digest (owner-requested 2026-07-17): deterministic diff
      # of the just-pushed commit vs its parent (same derivation the site uses),
      # posted as a comment on the pinned "Nightly digest" issue — GitHub's own
      # notification mail delivers each comment to issue subscribers. No AI, no
      # credentials beyond GITHUB_TOKEN; a digest hiccup never reddens a good publish.
      - name: Post run digest to the pinned issue
        if: steps.commit.outputs.pushed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          DIGEST_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          node src/digest.mjs HEAD^ HEAD > "$RUNNER_TEMP/digest.md"
          num="$(gh issue list --state open --search "in:title \"Nightly digest\"" --json number --jq '.[0].number // empty')" || num=""
          if [ -z "$num" ]; then
            url="$(gh issue create --title "Nightly digest — per-run change summaries" \
              --body "Automated per-run change digests (tier moves, new creator takes, new PTR builds, health) land as comments here — @riles22 stay subscribed to this issue to receive each one by email. Closing it just rotates the thread (the next publish opens a fresh one); to stop digests entirely, remove the 'Post run digest' step from nightly.yml, or use this issue's Unsubscribe button to silence the emails.")"
            num="${url##*/}"
          fi
          gh issue comment "$num" --body-file "$RUNNER_TEMP/digest.md"
