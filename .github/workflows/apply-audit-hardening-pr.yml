name: Apply audit hardening on PR

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/harden-refresh-manifest-provenance' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          ref: agent/harden-refresh-manifest-provenance
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
      - name: Apply patch
        run: python scripts/apply_audit_hardening.py
      - name: Validate
        run: npm test && npm run build
      - name: Commit validated result
        run: |
          git config user.name "Riley"
          git config user.email "120138825+riles22@users.noreply.github.com"
          git add src/check-manifest-provenance.mjs test/manifest-provenance.test.mjs .github/workflows/nightly.yml data/community.json dist/index.html
          if git diff --cached --quiet; then
            echo "Patch already applied"
            exit 0
          fi
          git commit -m "Harden refresh provenance and add MadSkillzzTV"
          git push origin HEAD:agent/harden-refresh-manifest-provenance
