name: Tests

# Validate every push and pull request with the same plain-Node test/build path
# used by the Pages deployment. This catches schema, integration, and generated
# artifact failures before changes reach master.

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Validate and test
        run: npm test
      - name: Build production artifact
        run: npm run build
      - name: Sanity-check generated site
        run: |
          test -s dist/index.html
          git diff --check
