name: TEMP diagnostic — tier-set text + WCL table probe

# TEMPORARY (2026-07-21, owner-requested tier-set/Dummy-Dome fix): the interactive
# session's egress cannot reach warcraftlogs.com or the Blizzard forum, so this
# dispatch-only workflow runs the two live checks from a runner instead:
#   1. src/wcl-probe.mjs — now includes the credential-free site statistics-table
#      rdps probe (is Dummy Dome median rDPS servable outside the broken API?).
#   2. Fetch the official PTR dev-notes thread's Discourse JSON and print the
#      verbatim tier-set wording from posts 10/11/14/15 (source texts for the
#      specs.json tierSet backfill — hard rule 1: live-fetched, never memory).
# DELETE THIS FILE once the fix lands — it is not part of the standing automation.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: WCL probe (site tables + API retry)
        env:
          WCL_CLIENT_ID: ${{ secrets.WCL_CLIENT_ID }}
          WCL_CLIENT_SECRET: ${{ secrets.WCL_CLIENT_SECRET }}
        run: node src/wcl-probe.mjs
      - name: Fetch PTR dev-notes thread posts (verbatim tier-set text)
        run: |
          curl -sS -m 60 -H "Accept: application/json" \
            "https://us.forums.blizzard.com/en/wow/t/midnight-curse-of-ulatek-ptr-development-notes/2317811.json?include_raw=1" \
            -o thread.json
          node --input-type=module - <<'EOF'
          import { readFileSync } from "node:fs";
          const t = JSON.parse(readFileSync("thread.json", "utf8"));
          const posts = t.post_stream?.posts ?? [];
          console.log(`thread: ${t.title} — ${posts.length} posts in stream`);
          for (const n of [10, 11, 14, 15]) {
            const p = posts.find(p => p.post_number === n);
            if (!p) { console.log(`\n===== post #${n}: NOT in post_stream =====`); continue; }
            const text = (p.raw ?? p.cooked ?? "").replace(/<[^>]+>/g, "").replace(/&amp;/g, "&").replace(/&#39;|&rsquo;/g, "'").replace(/&quot;/g, '"');
            console.log(`\n===== post #${n} (${p.created_at}) — set-bonus lines =====`);
            const lines = text.split("\n");
            lines.forEach((line, i) => {
              if (/venomous abyss|tier set|[24][ -]set|set bonus/i.test(line)) {
                // print with one line of surrounding context for attribution
                console.log(`  [ctx] ${lines[i-1]?.trim() ?? ""}`);
                console.log(`  ${line.trim()}`);
              }
            });
          }
          EOF
      - name: Upload raw thread JSON
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tmp-diag-thread
          path: thread.json
          retention-days: 3
