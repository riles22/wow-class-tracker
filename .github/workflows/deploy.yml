name: Build & deploy tracker to GitHub Pages

# The site is data/*.json compiled by src/build.mjs into a single self-contained
# dist/index.html. This workflow rebuilds from source on every push to master (so the
# nightly wow-ptr-watch refresh, which commits + pushes, auto-deploys) and can be run
# by hand. No dependencies to install — the build is plain Node.

on:
  push:
    branches: [master]
    paths:
      - "data/**"
      - "src/**"
      - "package.json"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate + test data
        run: npm test
      - name: Build dist/index.html
        run: npm run build
      - name: Sanity-check the artifact exists
        run: test -s dist/index.html
      - name: Configure Pages (auto-enables on first run)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload the built site
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.d1.outputs.page_url || steps.d2.outputs.page_url || steps.d3.outputs.page_url }}
    steps:
      # GitHub Pages' deploy API occasionally returns a transient "Deployment failed, try
      # again later" even though the build + artifact upload succeeded. Retry up to 3 times
      # with backoff before failing the run; the first success short-circuits the rest.
      - name: Deploy to GitHub Pages (attempt 1)
        id: d1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Back off before retry
        if: steps.d1.outcome == 'failure'
        run: sleep 20
      - name: Deploy to GitHub Pages (attempt 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Back off before final retry
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 40
      - name: Deploy to GitHub Pages (attempt 3, final)
        id: d3
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
